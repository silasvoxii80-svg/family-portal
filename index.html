<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thee Shiraho's family Portal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #dadbd3; margin: 0; padding: 0; color: #111b21; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background: #ffffff; min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.15); padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        h1, h2 { text-align: center; color: #008069; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: #008069; }
        input { width: 100%; padding: 14px; border: 1px solid #e9edef; background-color: #f0f2f5; border-radius: 8px; box-sizing: border-box; font-size: 16px; color: #111b21; }
        button { width: 100%; padding: 14px; background-color: #008069; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #dashboard-page { display: none; flex-direction: column; height: 100%; }
        .welcome-card { background: linear-gradient(135deg, #008069, #00a884); color: white; padding: 22px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .admin-badge { background-color: #d9fdd3; color: #111b21; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-top: 8px; }
        .call-button { background-color: #1fcd6c; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 18px; text-decoration: none; color: white; padding: 15px; border-radius: 10px; font-weight: bold; margin-bottom: 25px; box-shadow: 0 4px 8px rgba(31,205,108,0.3); }
        .chat-container { border: 1px solid rgba(0,0,0,0.05); border-radius: 16px; background: #efeae2; padding: 12px; height: 320px; margin-top: 10px; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 80%; padding: 8px 14px; border-radius: 10px; font-size: 15px; background: white; align-self: flex-start; }
        .msg-outbound { background: #d9fdd3; align-self: flex-end; }
        .chat-input-area { display: flex; gap: 8px; background: white; padding: 6px; border-radius: 25px; align-items: center; }
        .chat-input-area input { flex: 1; padding: 10px 15px; border: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="login-page">
            <h1>Thee Shiraho's Portal</h1>
            <div class="form-group"><label>Your Name</label><input type="text" id="username-input" placeholder="Enter name"></div>
            <div class="form-group"><label>Family Password</label><input type="password" id="password-input" placeholder="Enter password"></div>
            <button onclick="checkLogin()">Log In</button>
        </div>
        <div id="dashboard-page">
            <div class="welcome-card"><h3 id="welcome-text">Welcome!</h3><div class="admin-badge">Family Member</div></div>
            <a href="https://meet.jit.si/TheeShirahoFamilyMeeting2026" target="_blank" class="call-button">📞 Join Video Call</a>
            <h2>💬 Chat Room</h2>
            <div class="chat-container"><div class="chat-messages" id="chat-box"></div><div class="chat-input-area"><input type="text" id="chat-input"><button onclick="sendMessage()">Send</button></div></div>
        </div>
    </div>
    <script>
        function checkLogin() {
            var name = document.getElementById('username-input').value.trim();
            var pass = document.getElementById('password-input').value;
            // IF PASSWORD IS CORRECT, ANY NAME GETS IN
            if (pass === "shiraho2026" && name !== "") {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dashboard-page').style.display = 'flex';
                document.getElementById('welcome-text').innerText = "Welcome, " + name;
            } else { alert("Wrong password!"); }
        }
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            const msg = document.createElement('div');
            msg.className = "message msg-outbound";
            msg.innerText = input.value;
            chatBox.appendChild(msg);
            input.value = "";
        }
    </script>
</body>
</html>
