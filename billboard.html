<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silas & Lenceey | Eternal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .billboard-container {
            width: 92%;
            max-width: 450px;
            background: #121212;
            border: 2px solid #dfb76c; 
            border-radius: 16px;
            box-shadow: 0px 15px 40px rgba(223, 183, 108, 0.15);
            overflow: hidden;
            position: relative;
            text-align: center;
        }

        .billboard-image-wrapper {
            position: relative;
            width: 100%;
            height: 55vh;
            overflow: hidden;
            background-color: #1a1a1a;
        }

        .billboard-images-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            height: 100%;
            gap: 2px; 
        }

        .billboard-images-split img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gradient-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45%;
            background: linear-gradient(transparent, rgba(18, 18, 18, 0.8), #121212);
            pointer-events: none;
        }

        .billboard-content {
            padding: 30px 25px;
            background: #121212;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #dfb76c; 
            margin: 0 0 5px 0;
        }

        .ampersand {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #ffffff;
            font-size: 26px;
            display: block;
            margin: 3px 0;
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #a3a3a3;
            margin: 10px 0 20px 0;
            font-weight: 600;
        }

        .gold-line {
            width: 40px;
            height: 1px;
            background-color: #dfb76c;
            margin: 0 auto 20px auto;
        }

        .love-note {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 16px;
            line-height: 1.8;
            color: #e5e5e5;
            max-width: 90%;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="billboard-container">
        <div class="billboard-image-wrapper">
            <div class="billboard-images-split">
                <!-- Connected directly to your uploaded phone photos -->
                <img src="1000204523.png" alt="Silas Kisikwa">
                <img src="1000233395.jpg" alt="Lenceey Iminza">
            </div>
            <div class="gradient-overlay"></div>
        </div>
        
        <div class="billboard-content">
            <h1 class="main-title">Silas Kisikwa</h1>
            <span class="ampersand">and</span>
            <h1 class="main-title">Lenceey Iminza</h1>
            
            <p class="subtitle">An Unbreakable Connection</p>
            <div class="gold-line"></div>
            
            <blockquote class="love-note">
                "Two lives beautifully woven into one flawless story. Built on trust, defined by elegance, and destined to last forever."
            </blockquote>
        </div>
    </div>

</body>
    </html>
